<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIFF Test</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 24px; }
    pre { white-space: pre-wrap; font-size: 14px; }
    button { font-size: 16px; padding: 12px 16px; }
  </style>
</head>
<body>
  <h1>LIFF Test</h1>
  <button id="btn">Test Share</button>
  <pre id="log"></pre>

  <script>
    const LIFF_ID = '2009366271-c0TDpvSW';
    const log = (msg) => {
      document.getElementById('log').textContent += '\n' + msg;
    };

    async function init() {
      try {
        log('start init');
        await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
        log('init ok');
        log('isInClient=' + liff.isInClient());
        log('isLoggedIn=' + liff.isLoggedIn());
        log('shareTargetPicker=' + liff.isApiAvailable('shareTargetPicker'));
      } catch (e) {
        log('init error: ' + (e && e.message ? e.message : JSON.stringify(e)));
      }
    }

    document.getElementById('btn').onclick = async function () {
      try {
        const result = await liff.shareTargetPicker([
          { type: 'text', text: 'ทดสอบแชร์จาก LIFF' }
        ]);
        log(result ? 'share ok' : 'share canceled');
      } catch (e) {
        log('share error: ' + (e && e.message ? e.message : JSON.stringify(e)));
      }
    };

    init();
  </script>
</body>
</html>
